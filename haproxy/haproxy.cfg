global
    log /dev/log local0
    maxconn 2000
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend techstore_frontend
    bind *:80
    bind *:443 ssl crt /etc/haproxy/certs/techstores.pem
    redirect scheme https if !{ ssl_fc }
    default_backend techstore_backend

backend techstore_backend
    balance roundrobin
    server web1 172.31.27.214:8443 check ssl verify none weight 1
    server web2 172.31.30.1:8443 check ssl verify none weight 1

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
