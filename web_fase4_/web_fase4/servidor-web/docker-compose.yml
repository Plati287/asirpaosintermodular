version: "3.9"

services:
  php:
    build: .
    volumes:
      - ./app:/var/www/html

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - php

  db:
    image: mysql:8
    restart: always
    ports:
      - "3306:3306"
    command: --server-id=1 --log-bin=binlog --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tienda_online
      MYSQL_USER: tienda_user
      MYSQL_PASSWORD: tienda_pass
    volumes:
      - mysql_data:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
volumes:
  mysql_data:
