- name: Backup manual de BD y archivos web
  hosts: servidor-web
  become: yes

  tasks:
    - name: Crear carpeta de backups
      file:
        path: /home/ubuntu/backups
        state: directory

    - name: Backup de la base de datos
      shell: |
        FECHA=$(date +%Y%m%d_%H%M%S)
        docker exec tienda_online_last-db-1 mysqldump -uroot -proot tienda_online > /home/ubuntu/backups/bd_manual_$FECHA.sql
        echo "Backup BD creado: bd_manual_$FECHA.sql"
      register: backup_bd

    - name: Mostrar resultado backup BD
      debug:
        msg: "{{ backup_bd.stdout_lines }}"

    - name: Backup de archivos web
      shell: |
        FECHA=$(date +%Y%m%d_%H%M%S)
        tar -czf /home/ubuntu/backups/web_manual_$FECHA.tar.gz /home/ubuntu/tienda_online_last/app/
        echo "Backup web creado: web_manual_$FECHA.tar.gz"
      register: backup_web

    - name: Mostrar resultado backup web
      debug:
        msg: "{{ backup_web.stdout_lines }}"

    - name: Listar backups disponibles
      shell: ls -lh /home/ubuntu/backups/
      register: lista_backups

    - name: Mostrar backups
      debug:
        msg: "{{ lista_backups.stdout_lines }}"
