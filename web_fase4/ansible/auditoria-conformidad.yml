- name: Auditoría de conformidad de seguridad
  hosts: servidores
  become: yes

  tasks:
    - name: Verificar SSH sin contraseña
      shell: grep "PasswordAuthentication no" /etc/ssh/sshd_config
      register: ssh_check
      ignore_errors: yes

    - name: Verificar política de contraseñas
      shell: grep "minlen = 12" /etc/security/pwquality.conf
      register: pass_check
      ignore_errors: yes

    - name: Verificar firewall activo
      shell: sudo ufw status | grep -i "active\|inactive"
      register: firewall_check
      ignore_errors: yes

    - name: Verificar Docker corriendo
      shell: systemctl is-active docker
      register: docker_check
      ignore_errors: yes

    - name: Verificar contenedores corriendo
      shell: "docker ps --format '{%raw%}{{.Names}}{%endraw%}' | wc -l"
      register: contenedores_check
      ignore_errors: yes

    - name: Verificar backups existentes
      shell: ls /home/ubuntu/backups/ | wc -l
      register: backups_check
      ignore_errors: yes

    - name: Generar informe de conformidad
      debug:
        msg:
          - "======= INFORME DE CONFORMIDAD ======="
          - "Servidor: {{ inventory_hostname }}"
          - "Fecha: {{ ansible_date_time.date }}"
          - "======================================="
          - "SSH sin contraseña: {{ 'OK' if ssh_check.rc == 0 else 'FALLO' }}"
          - "Política contraseñas: {{ 'OK' if pass_check.rc == 0 else 'FALLO' }}"
          - "Docker activo: {{ 'OK' if docker_check.stdout == 'active' else 'FALLO' }}"
          - "Contenedores corriendo: {{ contenedores_check.stdout }}"
          - "Backups disponibles: {{ backups_check.stdout }}"
          - "======================================="
